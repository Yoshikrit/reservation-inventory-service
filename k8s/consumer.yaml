apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-consumer
  namespace: inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-consumer
  template:
    metadata:
      labels:
        app: inventory-consumer
    spec:
      automountServiceAccountToken: false
      containers:
        - name: consumer
          image: inventory:latest
          imagePullPolicy: IfNotPresent
          command: ["./consumer"]
          envFrom:
            - configMapRef:
                name: inventory-config
            - secretRef:
                name: inventory-secret
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 100Mi
