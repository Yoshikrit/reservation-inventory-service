services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: inventory
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.4
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-api:
    image: inventory:latest
    container_name: inventory-api
    restart: unless-stopped
    command: ["./api"]
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      REST_PORT: 8081
      DATABASE_URL: postgres://postgres:secret@postgres:5432/inventory?sslmode=disable&TimeZone=Asia/Bangkok
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory-grpc:
    image: inventory:latest
    container_name: inventory-grpc
    restart: unless-stopped
    command: ["./grpc"]
    ports:
      - "50051:50051"
    env_file: .env
    environment:
      GRPC_PORT: 50051
      DATABASE_URL: postgres://postgres:secret@postgres:5432/inventory?sslmode=disable&TimeZone=Asia/Bangkok
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  inventory-consumer:
    image: inventory:latest
    container_name: inventory-consumer
    restart: unless-stopped
    command: ["./consumer"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres:5432/inventory?sslmode=disable&TimeZone=Asia/Bangkok
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_CONFIRMED_RESERVATION: reservation-confirmed
      KAFKA_GROUP_INVENTORY_CONFIRMED_RESERVATION: inventory-group
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
